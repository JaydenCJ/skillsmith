<svg xmlns="http://www.w3.org/2000/svg" width="880" height="476" viewBox="0 0 880 476" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <rect width="880" height="476" rx="10" fill="#0d1117"/>
  <rect width="880" height="34" rx="10" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="17" r="6" fill="#febc2e"/>
  <circle cx="60" cy="17" r="6" fill="#28c840"/>
  <text x="440" y="21" fill="#8b949e" text-anchor="middle">skillsmith — scaffold and validate agent skills</text>

  <text x="24" y="64" fill="#7ee787">$ skillsmith new release-notes --hint "[range]"</text>
  <text x="24" y="88" fill="#c9d1d9">created <tspan fill="#79c0ff">release-notes</tspan> (SKILL.md, references/README.md, tests/cases.yaml)</text>
  <text x="24" y="108" fill="#8b949e">next: edit the TODOs, then run `skillsmith validate release-notes --strict`</text>

  <text x="24" y="144" fill="#7ee787">$ skillsmith validate examples/changelog-draft</text>
  <text x="24" y="168" fill="#c9d1d9">changelog-draft: <tspan fill="#3fb950">OK</tspan> — 0 error(s), 0 warning(s)</text>

  <text x="24" y="204" fill="#7ee787">$ skillsmith validate examples/needs-work</text>
  <text x="24" y="228" fill="#c9d1d9">Fix_Stuff: <tspan fill="#f85149">INVALID</tspan> — 3 error(s), 6 warning(s)</text>
  <text x="24" y="250" fill="#f85149">  SKILL.md:2 E_NAME_PATTERN `name` must be lowercase letters, digits and single hyphens (got "Fix_Stuff")</text>
  <text x="24" y="270" fill="#f85149">  SKILL.md:8 E_BROKEN_REF body references "references/checklist.md" but the file does not exist</text>
  <text x="24" y="290" fill="#d29922">  SKILL.md:4 W_UNKNOWN_KEY unknown front-matter key `argument_hint` — did you mean `argument-hint`?</text>
  <text x="24" y="310" fill="#d29922">  SKILL.md:7 W_NO_HINT body consumes arguments ($1) but front-matter has no `argument-hint`</text>
  <text x="24" y="330" fill="#8b949e">  … 5 more findings — run it yourself on examples/needs-work</text>

  <text x="24" y="366" fill="#7ee787">$ skillsmith test examples/changelog-draft</text>
  <text x="24" y="390" fill="#c9d1d9">changelog-draft: 2 case(s), 10 static check(s)</text>
  <text x="24" y="410" fill="#3fb950">OK — every case is well-formed and consistent with the skill</text>

  <text x="24" y="446" fill="#8b949e"># 0 runtime deps · fully offline · exit codes 0/1/2</text>
</svg>
